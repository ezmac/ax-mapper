services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      DATA_DIR: /app/data
      SERVER_PORT: "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
